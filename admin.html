<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • AutoVentas DO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">
      <div class="text-2xl font-bold">AutoVentas <span class="text-red-500">Admin</span></div>
      <a href="index.html" class="text-zinc-400 hover:text-white">← Catálogo</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <h1 class="text-4xl font-bold mb-8">Dashboard Administrador</h1>

    <div class="mb-12">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Inventario</h2>
        <button onclick="showAddModal()" class="px-6 py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-semibold flex items-center gap-2">
          <i class="fas fa-plus"></i> Añadir
        </button>
      </div>
      <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
        <table class="w-full">
          <thead class="bg-black">
            <tr>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">AUTO</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">AÑO</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">PRECIO</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">KM</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="admin-table"></tbody>
        </table>
      </div>
    </div>

    <div>
      <h2 class="text-2xl font-bold mb-6">Historial de Compras</h2>
      <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
        <table class="w-full">
          <thead class="bg-black">
            <tr>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">FECHA</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">CLIENTE</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">TELÉFONO</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">VEHÍCULO</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">CANT.</th>
              <th class="text-left px-8 py-5 text-xs font-medium text-zinc-400">TOTAL</th>
            </tr>
          </thead>
          <tbody id="pedidos-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal añadir/editar -->
  <div id="modal-form" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-lg max-h-[90dvh] overflow-hidden flex flex-col">
      <div class="p-6 border-b border-zinc-700 flex justify-between items-center">
        <h2 id="modal-title" class="text-2xl font-bold">Añadir Vehículo</h2>
        <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">
        <form id="car-form" onsubmit="saveCar(event)">
          <input type="hidden" id="edit-id">
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm mb-1">Marca</label><input id="brand" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
            <div><label class="block text-sm mb-1">Modelo</label><input id="model" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
          </div>
          <div class="grid grid-cols-3 gap-4 mt-4">
            <div><label class="block text-sm mb-1">Año</label><input id="year" type="number" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
            <div><label class="block text-sm mb-1">Precio</label><input id="price" type="number" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
            <div><label class="block text-sm mb-1">KM</label><input id="mileage" type="number" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
          </div>
          <div class="mt-4"><label class="block text-sm mb-1">URL Imagen</label><input id="image" type="url" required class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></div>
          <div class="mt-4"><label class="block text-sm mb-1">Descripción</label><textarea id="desc" rows="3" class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></textarea></div>
        </form>
      </div>
      <div class="p-6 border-t border-zinc-700">
        <div class="flex gap-4">
          <button onclick="closeModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancelar</button>
          <button type="submit" form="car-form" class="flex-1 py-4 bg-red-600 rounded-2xl font-bold">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script> 
  <script src="js/admin.js"></script>
</body>
</html>
